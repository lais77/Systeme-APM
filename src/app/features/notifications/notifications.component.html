<div class="page notifications-page">
  <div class="page-header flex-header">
    <div>
      <h1>Mes Notifications</h1>
      <span class="subtitle">Suivez l'activité de vos plans et actions</span>
    </div>
    <button class="btn-secondary" (click)="marquerToutCommeLu()" *ngIf="notifications.length > 0">
      Tout marquer comme lu
    </button>
  </div>

  <div *ngIf="chargement" class="loading">Chargement de vos notifications...</div>

  <div *ngIf="!chargement && notifications.length === 0" class="empty-state">
    <div class="empty-icon">📭</div>
    <h3>Aucune notification</h3>
    <p>Vous n'avez pas de notifications pour le moment.</p>
  </div>

  <div class="notifications-list" *ngIf="!chargement && notifications.length > 0">
    <div *ngFor="let notif of notifications" class="notification-card" [class.unread]="!notif.lu">
      <div class="notif-icon" [ngClass]="notif.type | lowercase">
        <span *ngIf="notif.type === 'ATTRIBUTION'">👤</span>
        <span *ngIf="notif.type === 'RAPPEL'">⏰</span>
        <span *ngIf="notif.type === 'RETARD'">⚠️</span>
        <span *ngIf="notif.type === 'STATUT'">🔄</span>
        <span *ngIf="notif.type === 'COMMENTAIRE'">💬</span>
        <span *ngIf="notif.type === 'ESCALADE'">📈</span>
        <span *ngIf="!notif.type">🔔</span>
      </div>
      
      <div class="notif-content">
        <div class="notif-header">
          <h4>{{ notif.titre }}</h4>
          <span class="notif-date">{{ notif.dateCreation | date:'dd/MM/yyyy HH:mm' }}</span>
        </div>
        <p class="notif-message">{{ notif.message }}</p>
      </div>
      
      <div class="notif-actions" *ngIf="!notif.lu">
        <button class="btn-icon" (click)="marquerCommeLu(notif.id)" title="Marquer comme lu">✔️</button>
      </div>
    </div>
  </div>
</div>
